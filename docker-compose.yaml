#      interval: 10s
#      timeout: 5s
#      retries: 5
#    networks:
#      - tracker-net

  tracker-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracker-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgresql
      POSTGRES_PORT: "5432"
      MONGO_URL: mongodb://mongo:27017
      REDIS_URL: redis://redis:6379/1
      RABBIT_URL: amqp://guest:guest@rabbitmq:5672//
    ports:
      - "8000:8000"
    depends_on:
      postgresql:
        condition: service_healthy
#      mongo:
#        condition: service_healthy
      redis:
        condition: service_healthy
#      rabbitmq:
#        condition: service_healthy
    networks:
      - tracker-net

  tracker-bot:
    build:
      context: bot/
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - '.env'
    environment:
      API_URL: http://tracker-api:8000
    depends_on:
      - tracker-api
      - postgresql
      - redis
    networks:
      - tracker-net


