#      retries: 5
#    networks:
#      - tracker-net

  redis:
    image: redis:7-alpine
    container_name: tracker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tracker-net

